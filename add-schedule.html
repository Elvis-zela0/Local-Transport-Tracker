<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Route | K-Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
<aside class="sidebar">
    <div class="mb-5">
        <h4 class="fw-bold text-primary">🚌 K-ADMIN</h4>
    </div>
    
    <nav>
        <a href="admin-index.html" class="nav-link-custom">Admin Overview</a>
        
        <a href="admin-schedules.html" class="nav-link-custom">Manage Schedules</a>
        
        <a href="add-schedule.html" class="nav-link-custom">Add New Route</a>
        
        <hr class="opacity-25 my-4">
        
        <a href="index.html" class="nav-link-custom text-danger">Logout (Exit Admin)</a>
    </nav>
</aside>

        <main class="main-content">
            <h2 class="fw-bold">Register Transport Data</h2>
            <div class="glass-card mt-4">
                <form id="addScheduleForm" class="needs-validation" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold">Operator</label><input type="text" class="form-control" required></div>
                        <div class="col-md-6"><label class="form-label fw-bold">Price (RWF)</label><input type="number" class="form-control" required></div>
                        <div class="col-12"><label class="form-label fw-bold">Route Destination</label><input type="text" class="form-control" required></div>
                    </div>
                    <button type="submit"  class="btn btn-pro w-100 mt-4">PUBLISH ROUTE</button>
                </form>
            </div>
            <footer>Powered by Kwizera Dev Group</footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
