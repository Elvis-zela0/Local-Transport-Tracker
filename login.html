<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | K-Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; font-family: 'Inter', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .btn-login { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="fw-bold mb-1">Admin Portal</h3>
        <p class="text-muted small mb-4">Secure access for Kwizera Dev Group Officers.</p>
        <form onsubmit="event.preventDefault(); window.location.href='add-schedule.html';">
            <div class="mb-3"><label class="small fw-bold">EMAIL</label><input type="email" class="form-control" required></div>
            <div class="mb-4"><label class="small fw-bold">PASSWORD</label><input type="password" class="form-control" required></div>
            <button type="submit" class="btn-login">ENTER DASHBOARD</button>
            <div class="mt-3 text-center"><a href="index.html" class="text-muted small text-decoration-none">Back to Public View</a></div>
        </form>
    </div>
</body>
</html>
