<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Issue | K-Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container"><a class="navbar-brand" href="index.html">🚌 K-Tracker</a></div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title mb-4">Report a Route Issue</h3>
                        <form id="reportForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Route Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Route 102" required>
                                <div class="invalid-feedback">Please enter the route.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Issue Type</label>
                                <select class="form-select" required>
                                    <option value="">Select an issue...</option>
                                    <option>Bus Delay</option>
                                    <option>Full Bus</option>
                                    <option>Road Blockage</option>
                                </select>
                                <div class="invalid-feedback">Please select an issue.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Submit Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        alert('Thank you! Your report has been submitted.');
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
    <script src="script.js"></script>
</body>
</html>
